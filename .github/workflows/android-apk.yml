name: Build apps (Windows + Android)

# Builds the Android APK and the Windows app in the cloud and publishes both to
# a single "latest" GitHub Release, so anyone visiting the repo can download
# either one directly — no account, no local tools needed.
#
# Run from the Actions tab (Run workflow), or it runs on every push to main.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------- Android APK ----------
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npx cap add android
      - name: Generate app icons (optional)
        continue-on-error: true
        run: npx capacitor-assets generate --android --assetPath resources
      - run: npx cap sync android
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - run: cp android/app/build/outputs/apk/debug/app-debug.apk ZTE-Router-Manager.apk
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: ZTE-Router-Manager.apk
          if-no-files-found: error

  # ---------- Windows app ----------
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - name: Build Windows app
        run: npm run dist:win
      - name: Zip the Windows app
        run: Compress-Archive -Path "release/ZTE Router Manager-win32-x64/*" -DestinationPath "ZTE-Router-Manager-Windows.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ZTE-Router-Manager-Windows.zip
          if-no-files-found: error

  # ---------- Publish whatever built to a public Release ----------
  release:
    needs: [android, windows]
    if: always() # publish even if one platform failed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          path: release-files
      - name: Publish "latest" Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/publish-release.sh
